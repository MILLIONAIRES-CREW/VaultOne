  /** Debt payoff calculator */
  openPayoffModal() {
    this.modal.open('Debt Payoff Calculator', `<div class="form-grid">
      <div class="form-group"><label>Balance</label><input type="number" id="poBal" value="10000"></div>
      <div class="form-group"><label>Annual Rate (%)</label><input type="number" id="poRate" value="18" step="0.01"></div>
      <div class="form-group"><label>Monthly Payment</label><input type="number" id="poPay" value="300"></div>
      <div class="form-group"><label>Extra Payment</label><input type="number" id="poExtra" value="100"></div>
    </div><button class="btn btn-primary" style="margin-top:12px" onclick="app.calcPayoff()">Calculate</button><div id="poResult"></div>`, '', true);
  }

  /** Calculate payoff scenarios */
  calcPayoff() {
    const bal = parseFloat(document.getElementById('poBal').value), rate = parseFloat(document.getElementById('poRate').value) / 100 / 12;
    const pay = parseFloat(document.getElementById('poPay').value), extra = parseFloat(document.getElementById('poExtra').value);
    const calcMonths = (b, p) => { let m = 0, b2 = b; while (b2 > 0 && m < 600) { b2 -= p - b2 * rate; m++; } return m; };
    const normal = calcMonths(bal, pay), withExtra = calcMonths(bal, pay + extra);
    const saved = normal - withExtra;
    document.getElementById('poResult').innerHTML = `<div style="margin-top:16px">
      <p><strong>Standard:</strong> ${normal} months (${(normal/12).toFixed(1)} years)</p>
      <p><strong>With extra ${this.$(extra)}:</strong> ${withExtra} months (${(withExtra/12).toFixed(1)} years)</p>
      <p style="color:var(--income)"><strong>Time saved:</strong> ${saved} months (${(saved/12).toFixed(1)} years)</p></div>`;
  }

  /** Sort crypto holdings table */
  cryptoSort(field) {
    const map = { avgBuy: 'invested', cost: 'invested', live: 'value', alloc: 'value', amount: 'amount' };
    const f = map[field] || field;
    if (this.cryptoState.sort === f) this.cryptoState.dir = this.cryptoState.dir === 'asc' ? 'desc' : 'asc';
    else { this.cryptoState.sort = f; this.cryptoState.dir = f === 'name' ? 'asc' : 'desc'; }
    this.renderCryptoPortfolio();
  }

  /** Manually refresh crypto prices */
  async refreshCryptoPrices(force = true) {
    this.provider.clearPriceCache();
    await this.crypto.refreshPrices(force, false);
    this.renderCryptoPortfolio();
    if (this.currentView === 'dashboard') this.renderDashboard();
  }

  /** Open add/edit crypto holding modal */
  openCryptoModal(id = null) {
    const h = id ? this.store.get('cryptoHoldings', id) : null;
    this.cryptoModalCoin = h ? { id: h.coinGeckoId, name: h.name, symbol: h.symbol, thumb: h.logoUrl } : null;
    const chip = this.cryptoModalCoin ? `<div class="coin-selected-chip" id="cryptoCoinChip">${this.cryptoModalCoin.thumb ? `<img class="coin-logo sm" src="${Utils.esc(this.cryptoModalCoin.thumb)}" alt="">` : ''}<strong>${Utils.esc(this.cryptoModalCoin.name)}</strong> (${this.cryptoModalCoin.symbol}) <button type="button" class="btn-icon btn-sm" onclick="app.clearCryptoCoinSelect()" style="margin-left:8px" title="Change coin"><i class="fas fa-pen"></i></button></div>` : '';
    this.modal.open(id ? 'Edit Crypto Holding' : 'Add Crypto Holding', `<div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Cryptocurrency</label>
        <div class="coin-autocomplete-wrap">
          <input type="text" id="cryptoCoinSearch" placeholder="Search BTC, ETH, DOGE..." autocomplete="off" ${h ? 'style="display:none"' : ''}>
          <div class="coin-autocomplete-results" id="cryptoCoinResults"></div>
        </div>
        ${chip}
        <div id="cryptoCoinChipWrap">${h ? '' : ''}</div>
      </div>
      <div class="form-group"><label>Amount Owned</label><input type="number" id="cryptoAmount" step="any" value="${h?.amount ?? ''}"></div>
      <div class="form-group"><label>Average Buy Price</label><input type="number" id="cryptoAvgBuy" step="any" value="${h?.avgBuyPrice ?? ''}"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Notes (optional)</label><textarea id="cryptoNotes">${Utils.esc(h?.notes||'')}</textarea></div>
    </div>`, `<button class="btn btn-secondary" onclick="app.modal.close()">Cancel</button><button class="btn btn-primary" onclick="app.saveCryptoHolding('${id||''}')">Save</button>`);
    this.bindCoinAutocomplete();
  }

  /** Bind coin search autocomplete in modal */
  bindCoinAutocomplete() {
    const input = document.getElementById('cryptoCoinSearch');
    const results = document.getElementById('cryptoCoinResults');
    if (!input) return;
    const search = Utils.debounce(async () => {
      const q = input.value.trim();
      if (q.length < 1) { results.classList.remove('open'); return; }
      const coins = await this.provider.searchCoins(q);
      if (!coins.length) { results.innerHTML = '<div style="padding:12px;color:var(--text-muted)">No coins found</div>'; results.classList.add('open'); return; }
      results.innerHTML = coins.map(c => `
        <div class="coin-result-item" data-id="${Utils.esc(c.id)}" data-name="${Utils.esc(c.name)}" data-symbol="${Utils.esc(c.symbol)}" data-thumb="${Utils.esc(c.thumb||'')}">
          ${c.thumb ? `<img class="coin-logo sm" src="${Utils.esc(c.thumb)}" alt="">` : '<i class="fas fa-coins" style="width:22px;text-align:center;color:var(--text-muted)"></i>'}
          <div><strong>${Utils.esc(c.name)}</strong> <span style="color:var(--text-muted)">${c.symbol}</span></div>
        </div>`).join('');
      results.classList.add('open');
      results.querySelectorAll('.coin-result-item').forEach(el => {
        el.onclick = () => {
          this.cryptoModalCoin = { id: el.dataset.id, name: el.dataset.name, symbol: el.dataset.symbol, thumb: el.dataset.thumb };
          input.style.display = 'none';
          results.classList.remove('open');
          const wrap = input.closest('.form-group');
          let chip = wrap.querySelector('.coin-selected-chip');
          if (!chip) { chip = document.createElement('div'); chip.className = 'coin-selected-chip'; chip.id = 'cryptoCoinChip'; wrap.appendChild(chip); }
          chip.innerHTML = `${this.cryptoModalCoin.thumb ? `<img class="coin-logo sm" src="${Utils.esc(this.cryptoModalCoin.thumb)}" alt="">` : ''}<strong>${Utils.esc(this.cryptoModalCoin.name)}</strong> (${this.cryptoModalCoin.symbol}) <button type="button" class="btn-icon btn-sm" onclick="app.clearCryptoCoinSelect()" style="margin-left:8px"><i class="fas fa-times"></i></button>`;
        };
      });
    }, 300);
    input.oninput = search;
    input.onfocus = () => { if (input.value) search(); };
  }

  /** Clear selected coin in modal */
  clearCryptoCoinSelect() {
    this.cryptoModalCoin = null;
    const input = document.getElementById('cryptoCoinSearch');
    if (input) { input.style.display = ''; input.value = ''; input.focus(); }
    const chip = document.getElementById('cryptoCoinChip');
    if (chip) chip.remove();
  }

  /** Save crypto holding */
  async saveCryptoHolding(id) {
    const coin = this.cryptoModalCoin;
    if (!coin && !id) { this.toast.show('Please select a cryptocurrency', 'error'); return; }
    const amount = parseFloat(document.getElementById('cryptoAmount').value);
    const avgBuyPrice = parseFloat(document.getElementById('cryptoAvgBuy').value);
    const notes = document.getElementById('cryptoNotes').value;
    if (!amount || amount <= 0) { this.toast.show('Amount is required', 'error'); return; }
    if (!avgBuyPrice || avgBuyPrice < 0) { this.toast.show('Average buy price is required', 'error'); return; }
    const existing = id ? this.store.get('cryptoHoldings', id) : null;
    const data = {
      coinGeckoId: coin?.id || existing.coinGeckoId,
      name: coin?.name || existing.name,
      symbol: coin?.symbol || existing.symbol,
      logoUrl: coin?.thumb || existing.logoUrl,
      amount, avgBuyPrice, notes
    };
    if (id) this.store.update('cryptoHoldings', id, data);
    else this.store.add('cryptoHoldings', data);
    this.modal.close();
    this.toast.show('Holding saved', 'success');
    await this.crypto.refreshPrices(true, true);
    this.crypto.startAutoRefresh();
    this.navigate('crypto');
  }

  /** Delete crypto holding */
  async deleteCryptoHolding(id) {
    if (!await this.modal.confirm('Delete Holding', 'Remove this crypto holding?')) return;
    this.store.remove('cryptoHoldings', id);
    this.toast.show('Holding deleted', 'success');
    if (this.store.data.cryptoHoldings.length) await this.crypto.refreshPrices(true, true);
    else this.crypto.stopAutoRefresh();
    this.navigate('crypto');
  }

  // ========== BUDGETS ==========
  /** Render budgets view */
  renderBudgets() {
    const month = Utils.monthKey(new Date());
    const budgets = this.store.data.budgets.filter(b => b.month === month);
    const cats = this.store.data.categories.filter(c => c.type === 'expense' || c.type === 'both');
    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">Budgets</h1><p class="page-subtitle">${new Date().toLocaleString('default', { month: 'long', year: 'numeric' })}</p></div>
        <button class="btn btn-primary" onclick="app.openBudgetModal()"><i class="fas fa-plus"></i> Add Budget</button></div>
      ${budgets.length ? budgets.map(b => {
        const spent = this.calc.budgetSpent(b.categoryId, month);
        const pct = b.amount ? (spent / b.amount * 100).toFixed(0) : 0;
        const cls = pct >= 100 ? 'red' : pct >= 75 ? 'amber' : 'green';
        return `<div class="card">
          <div class="card-header"><div class="card-title">${this.catName(b.categoryId)}</div>
            <div><span style="font-weight:600">${this.$(spent)}</span> / ${this.$(b.amount)}
            <button class="btn-icon btn-sm" onclick="app.openBudgetModal('${b.id}')"><i class="fas fa-pen"></i></button>
            <button class="btn-icon btn-sm" onclick="app.deleteBudget('${b.id}')"><i class="fas fa-trash"></i></button></div></div>
          <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${Math.min(100,pct)}%"></div></div>
          <div style="font-size:12px;color:var(--text-secondary)">${pct}% used | Remaining: ${this.$(Math.max(0, b.amount - spent))}</div>
        </div>`;
      }).join('') + '<div class="card"><div class="card-title">Budget Usage</div><div class="chart-container"><canvas id="chartBudget"></canvas></div></div>' :
      '<div class="empty-state"><i class="fas fa-calculator"></i><h3>No budgets set</h3><p>Create monthly budgets to control spending.</p><button class="btn btn-primary" onclick="app.openBudgetModal()">Add Budget</button></div>'}`;
    if (budgets.length) setTimeout(() => {
      const el = document.getElementById('chartBudget');
      if (el) this.charts.render('budget', el, 'bar', {
        labels: budgets.map(b => this.catName(b.categoryId)),
        datasets: [
          { label: 'Budgeted', data: budgets.map(b => b.amount), backgroundColor: this.charts.colors().accent + '60' },

  // ========== REPORTS ==========
  /** Render reports view */
  renderReports(period) {
    this.reportPeriod = period;
    const [start, end] = Utils.periodRange(period);
    const txs = this.store.data.transactions.filter(t => t.date >= start && t.date <= end);
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expenses = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const savings = income - expenses;
    const debt = this.calc.ccDebt() + this.calc.loansTotal();
    const expCats = Object.entries(this.calc.categorySpending(start, end, 'expense')).sort((a, b) => b[1] - a[1]);
    const incCats = Object.entries(this.calc.categorySpending(start, end, 'income')).sort((a, b) => b[1] - a[1]);

    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">${period === 'month' ? 'Monthly' : period === 'year' ? 'Yearly' : 'Custom'} Report</h1>
        <p class="page-subtitle">${Utils.formatDate(start, this.store.settings)} — ${Utils.formatDate(end, this.store.settings)}</p></div>
        <div><button class="btn btn-secondary" onclick="app.exportCSV()"><i class="fas fa-file-csv"></i> CSV</button>
        <button class="btn btn-secondary" onclick="app.printReport()"><i class="fas fa-print"></i> Print</button></div></div>
      <div class="tabs">
        <button class="tab ${period==='month'?'active':''}" onclick="app.renderReports('month')">This Month</button>
        <button class="tab ${period==='year'?'active':''}" onclick="app.renderReports('year')">This Year</button>
        <button class="tab ${typeof period==='object'?'active':''}" onclick="app.openCustomReport()">Custom Range</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card income"><div class="stat-label">Income</div><div class="stat-value">${this.$(income)}</div></div>
        <div class="stat-card expense"><div class="stat-label">Expenses</div><div class="stat-value">${this.$(expenses)}</div></div>
        <div class="stat-card accent"><div class="stat-label">Savings</div><div class="stat-value">${this.$(savings)}</div></div>
        <div class="stat-card neutral"><div class="stat-label">Net Cash Flow</div><div class="stat-value">${this.$(savings)}</div></div>
        <div class="stat-card warning"><div class="stat-label">Total Debt</div><div class="stat-value">${this.$(debt)}</div></div>
        <div class="stat-card accent"><div class="stat-label">Net Worth</div><div class="stat-value">${this.$(this.calc.netWorth())}</div></div>
      </div>
      <div class="chart-row">
        <div class="card"><div class="card-title">Expenses by Category</div><div class="chart-container"><canvas id="chartRepExp"></canvas></div></div>
        <div class="card"><div class="card-title">Income by Category</div><div class="chart-container"><canvas id="chartRepInc"></canvas></div></div>
      </div>
      <div class="card"><div class="card-title">Cash Flow Trend</div><div class="chart-container"><canvas id="chartRepCF"></canvas></div></div>`;

    setTimeout(() => {
      const c = this.charts.colors();
      if (expCats.length) this.charts.render('repExp', document.getElementById('chartRepExp'), 'doughnut', { labels: expCats.map(c => c[0]), datasets: [{ data: expCats.map(c => c[1]), backgroundColor: c.palette }] });
      if (incCats.length) this.charts.render('repInc', document.getElementById('chartRepInc'), 'doughnut', { labels: incCats.map(c => c[0]), datasets: [{ data: incCats.map(c => c[1]), backgroundColor: c.palette }] });
      const buckets = this.calc.cashFlowBuckets(period);
      const keys = Object.keys(buckets).sort();
      this.charts.render('repCF', document.getElementById('chartRepCF'), 'bar', {
        labels: keys, datasets: [

  /** Run custom report */
  runCustomReport() {
    const start = document.getElementById('crStart').value, end = document.getElementById('crEnd').value;
    if (!start || !end) { this.toast.show('Select dates', 'error'); return; }
    this.modal.close();
    this.reportPeriod = { start, end };
    this.renderReports({ start, end });

  /** Export CSV */
  exportCSV() {
    const [start, end] = Utils.periodRange(this.reportPeriod);
    const txs = this.store.data.transactions.filter(t => t.date >= start && t.date <= end);
    const header = 'Date,Time,Description,Category,Account,Type,Amount,Payment Method,Notes,Tags\n';
    const rows = txs.map(t => [t.date, t.time, `"${t.description}"`, this.catName(t.categoryId), this.accName(t.accountId), t.type, t.amount, t.paymentMethod, `"${t.notes||''}"`, `"${(t.tags||[]).join(';')}"`].join(',')).join('\n');
    Utils.download(`pfm-report-${start}-${end}.csv`, header + rows, 'text/csv');
    this.toast.show('CSV exported', 'success');
  }

  /** Print report */
  printReport() {
    const [start, end] = Utils.periodRange(this.reportPeriod);
    const txs = this.store.data.transactions.filter(t => t.date >= start && t.date <= end);
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expenses = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    document.getElementById('printReport').innerHTML = `<h1>Financial Report</h1><p>${Utils.formatDate(start, this.store.settings)} — ${Utils.formatDate(end, this.store.settings)}</p>
      <h2>Summary</h2><p>Income: ${this.$(income)} | Expenses: ${this.$(expenses)} | Savings: ${this.$(income - expenses)} | Net Worth: ${this.$(this.calc.netWorth())}</p>
      <h2>Transactions (${txs.length})</h2><table border="1" cellpadding="8" style="width:100%;border-collapse:collapse"><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Type</th></tr>
      ${txs.map(t => `<tr><td>${t.date}</td><td>${Utils.esc(t.description)}</td><td>${this.catName(t.categoryId)}</td><td>${this.$(t.amount)}</td><td>${t.type}</td></tr>`).join('')}</table>`;
    window.print();
  }

  // ========== CALENDAR ==========
  /** Render calendar view */
  renderCalendar() {
    const y = this.calMonth.getFullYear(), m = this.calMonth.getMonth();
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const today = Utils.toISO(new Date());
    const monthName = this.calMonth.toLocaleString('default', { month: 'long', year: 'numeric' });

    const getEvents = (dateStr) => {
      const events = [];
      this.store.data.transactions.filter(t => t.date === dateStr).forEach(t => events.push({ type: 'tx', color: 'tx', text: `${t.type === 'income' ? '+' : '-'}${this.$(t.amount)} ${t.description}` }));
      this.store.data.creditCards.forEach(c => { if (Utils.isPaymentDay(dateStr, c.nextPaymentDate, this.calMonth)) events.push({ type: 'bill', color: 'bill', text: `${c.name} due` }); });
      this.store.data.loans.forEach(l => { if (Utils.isPaymentDay(dateStr, l.nextPaymentDate, this.calMonth)) events.push({ type: 'bill', color: 'bill', text: `${l.name} payment` }); });
      this.store.data.recurring.filter(r => r.active && r.nextDate === dateStr).forEach(r => events.push({ type: 'income', color: r.type === 'income' ? 'income' : 'bill', text: r.description }));
      return events;
    };

    let cells = '';
    for (let i = 0; i < firstDay; i++) cells += '<div class="cal-day other-month"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = Utils.toISO(new Date(y, m, d));
      const events = getEvents(dateStr);
      cells += `<div class="cal-day ${dateStr === today ? 'today' : ''}" onclick="app.showCalDay('${dateStr}')">
        ${d}<div class="cal-dots">${events.slice(0, 4).map(e => `<div class="cal-dot ${e.color}"></div>`).join('')}</div></div>`;
    }

    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">Calendar</h1><p class="page-subtitle">${monthName}</p></div>
        <div><button class="btn btn-icon" onclick="app.calMonth.setMonth(app.calMonth.getMonth()-1);app.renderCalendar()"><i class="fas fa-chevron-left"></i></button>
        <button class="btn btn-secondary btn-sm" onclick="app.calMonth=new Date();app.renderCalendar()">Today</button>
        <button class="btn btn-icon" onclick="app.calMonth.setMonth(app.calMonth.getMonth()+1);app.renderCalendar()"><i class="fas fa-chevron-right"></i></button></div></div>
      <div class="card"><div class="calendar-grid">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-header">${d}</div>`).join('')}
        ${cells}
      </div></div>
      <div id="calDayPanel"></div>`;
  }

  /** Show calendar day detail */
  showCalDay(dateStr) {
    const events = [];
    this.store.data.transactions.filter(t => t.date === dateStr).forEach(t => events.push({ icon: 'receipt', text: `${t.description} — ${this.$(t.amount)}`, type: t.type }));
    this.store.data.creditCards.forEach(c => { if (Utils.isPaymentDay(dateStr, c.nextPaymentDate, this.calMonth)) events.push({ icon: 'credit-card', text: `${c.name} payment due — ${this.$(c.minPayment)}${c.linkedAccountId ? ' from ' + this.accName(c.linkedAccountId) : ''}`, type: 'bill' }); });
    this.store.data.loans.forEach(l => { if (Utils.isPaymentDay(dateStr, l.nextPaymentDate, this.calMonth)) events.push({ icon: 'landmark', text: `${l.name} payment — ${this.$(l.monthlyPayment)}${l.linkedAccountId ? ' from ' + this.accName(l.linkedAccountId) : ''}`, type: 'bill' }); });
    this.store.data.recurring.filter(r => r.active && r.nextDate === dateStr).forEach(r => events.push({ icon: 'rotate', text: `${r.description} — ${this.$(r.amount)}`, type: r.type }));
    document.getElementById('calDayPanel').innerHTML = `<div class="card"><div class="card-title">${Utils.formatDate(dateStr, this.store.settings)}</div>
      ${events.length ? events.map(e => `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center"><i class="fas fa-${e.icon}" style="color:var(--${e.type==='income'?'income':'expense'})"></i>${Utils.esc(e.text)}</div>`).join('') : '<p style="color:var(--text-muted)">No events</p>'}</div>`;
  }

      numberFormat: document.getElementById('setNumFmt').value,
      dateFormat: document.getElementById('setDateFmt').value,
      autoBackup: document.getElementById('setAutoBackup').value === 'true'
    });
    this.applyTheme(this.store.settings.theme);
    this.provider.clearPriceCache();
    if (this.store.data.cryptoHoldings?.length) this.crypto.refreshPrices(true, true);
    this.toast.show('Settings saved', 'success');

  /** Save crypto-specific settings */

    const keyEl = document.getElementById('setCoingeckoKey');
    const refreshEl = document.getElementById('setCryptoRefresh');
    if (keyEl) this.store.updateSettings({ coingeckoApiKey: keyEl.value.trim() });
    if (refreshEl) {
      this.store.updateSettings({ cryptoAutoRefresh: refreshEl.value === 'true' });
      this.crypto.stopAutoRefresh();
      if (refreshEl.value === 'true') this.crypto.startAutoRefresh();
    }
    this.toast.show('Crypto settings saved', 'success');
  }

  renderBackup() {
    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">Backup</h1><p class="page-subtitle">Export your data as JSON</p></div></div>
      <div class="card" style="text-align:center;padding:40px">
        <i class="fas fa-download" style="font-size:48px;color:var(--accent);margin-bottom:16px"></i>
        <h3>Export All Data</h3>
        <p style="color:var(--text-secondary);margin:12px 0 24px">Download a complete backup of all your financial data.</p>
        <button class="btn btn-primary" onclick="app.exportBackup()"><i class="fas fa-download"></i> Export JSON</button>
      </div>`;
  }

  /** Export backup */
  exportBackup() {
    const date = Utils.toISO(new Date());
    Utils.download(`pfm-backup-${date}.json`, this.store.exportJSON());
    this.toast.show('Backup exported', 'success');
  }

  /** Render restore view */
  renderRestore() {
    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">Restore</h1><p class="page-subtitle">Import data from a JSON backup</p></div></div>
      <div class="card" style="text-align:center;padding:40px">
        <i class="fas fa-upload" style="font-size:48px;color:var(--accent);margin-bottom:16px"></i>
        <h3>Import Backup</h3>
        <p style="color:var(--text-secondary);margin:12px 0 24px">Select a previously exported JSON backup file.</p>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="app.importBackup(this)">
        <button class="btn btn-primary" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> Import JSON</button>
      </div>`;
  }

  /** Import backup file */
  async importBackup(input) {
    const file = input.files[0];
    if (!file) return;
    const text = await file.text();
    if (await this.modal.confirm('Import Data', 'This will overwrite all current data. Continue?')) {
      try {
        this.store.importJSON(text);
        this.toast.show('Data imported successfully', 'success');
        this.navigate('dashboard');
      } catch (e) {
        this.toast.show('Invalid backup file', 'error');
      }
    }
    input.value = '';
  }

  // ========== GLOBAL SEARCH ==========
  /** Perform global search */
  globalSearch(query) {
    const results = document.getElementById('searchResults');
    if (!query || query.length < 2) { results.classList.remove('open'); return; }
    const q = query.toLowerCase();
    const groups = {};

    this.store.data.transactions.forEach(t => {
      const hay = [t.description, t.notes, ...(t.tags||[])].join(' ').toLowerCase();
      if (hay.includes(q)) { if (!groups.Transactions) groups.Transactions = []; groups.Transactions.push({ icon: 'receipt', text: t.description, sub: `${this.$(t.amount)} — ${Utils.formatDate(t.date, this.store.settings)}`, action: () => this.openTransactionModal(t.id) }); }
    });
    this.store.data.accounts.forEach(a => {
      if (a.name.toLowerCase().includes(q)) { if (!groups.Accounts) groups.Accounts = []; groups.Accounts.push({ icon: 'wallet', text: a.name, sub: this.$(this.calc.accountBalance(a.id)), action: () => this.navigate('accounts') }); }
    });
    this.store.data.creditCards.forEach(c => {
      if (c.name.toLowerCase().includes(q) || c.bank.toLowerCase().includes(q)) { if (!groups['Credit Cards']) groups['Credit Cards'] = []; groups['Credit Cards'].push({ icon: 'credit-card', text: c.name, sub: `Balance: ${this.$(c.balance)}`, action: () => this.navigate('creditcards') }); }
    });
    this.store.data.loans.forEach(l => {
      if (l.name.toLowerCase().includes(q)) { if (!groups.Loans) groups.Loans = []; groups.Loans.push({ icon: 'landmark', text: l.name, sub: `Balance: ${this.$(l.currentBalance)}`, action: () => this.navigate('loans') }); }
    });
    this.store.data.categories.forEach(c => {
      if (c.name.toLowerCase().includes(q)) { if (!groups.Categories) groups.Categories = []; groups.Categories.push({ icon: 'tag', text: c.name, sub: c.type, action: () => this.navigate('transactions') }); }
    });
    (this.store.data.cryptoHoldings || []).forEach(h => {
      const hay = [h.name, h.symbol, h.notes].join(' ').toLowerCase();
      if (hay.includes(q)) { if (!groups['Crypto']) groups['Crypto'] = []; groups['Crypto'].push({ icon: 'bitcoin-sign', text: `${h.name} (${h.symbol})`, sub: `${h.amount} coins`, action: () => this.navigate('crypto') }); }
    });

    let html = '';
    const allItems = [];
    Object.entries(groups).forEach(([group, items]) => {
      html += `<div class="search-group"><div class="search-group-title">${group}</div>`;
      items.slice(0, 5).forEach((item, i) => {
        const idx = allItems.length;
        allItems.push(item);
        html += `<div class="search-result-item" data-idx="${idx}"><i class="fas fa-${item.icon}"></i><div><div>${Utils.esc(item.text)}</div><small style="color:var(--text-muted)">${Utils.esc(String(item.sub))}</small></div></div>`;
      });
      html += '</div>';
    });

    if (!html) html = '<div style="padding:16px;color:var(--text-muted)">No results found</div>';
    results.innerHTML = html;
    results.classList.add('open');

    results.querySelectorAll('.search-result-item').forEach(el => {
      const idx = parseInt(el.dataset.idx, 10);
      el.onclick = () => { allItems[idx]?.action(); results.classList.remove('open'); document.getElementById('globalSearch').value = ''; };
    });
  }
}

// ========== BOOTSTRAP ==========
const app = new FinanceApp();
window.app = app;
</script>
</body>
</html>
