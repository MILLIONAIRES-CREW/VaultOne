<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOne — Personal Finance Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ========== CSS VARIABLES & RESET ========== */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: rgba(255,255,255,0.04);
  --bg-glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #14b8a6;
  --accent-hover: #0d9488;
  --income: #10b981;
  --expense: #f43f5e;
  --warning: #f59e0b;
  --info: #3b82f6;
  --sidebar-w: 260px;
  --topbar-h: 64px;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --blur: blur(16px);
  --transition: 0.25s ease;
}
[data-theme="light"] {
  --bg-primary: #f0f4f8;
  --bg-secondary: #ffffff;
  --bg-card: rgba(255,255,255,0.8);
  --bg-glass: rgba(255,255,255,0.7);
  --border: rgba(0,0,0,0.08);
  --text-primary: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button,input,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);padding:10px 14px;outline:none;transition:var(--transition)}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(20,184,166,0.15)}
textarea{resize:vertical;min-height:80px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ========== LAYOUT ========== */
.app{display:flex;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg-glass);backdrop-filter:var(--blur);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:var(--transition)}
.sidebar.collapsed{width:72px}
.sidebar-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;min-height:var(--topbar-h)}
.sidebar-header .logo{width:42px;height:42px;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:transparent;box-shadow:0 0 0 1px rgba(212,168,83,0.28),0 4px 18px rgba(212,168,83,0.16),0 10px 28px rgba(0,0,0,0.35)}
.sidebar-header .logo::before{content:'';position:absolute;inset:-1px;border-radius:50%;background:conic-gradient(from 210deg,#f8ecd8 0%,#e8c872 18%,#9a7b2f 42%,#d4a853 68%,#f5e6c8 100%);opacity:0.42;z-index:0}
.sidebar-header .logo::after{content:'';position:absolute;inset:1px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,0.08),transparent 55%);z-index:2;pointer-events:none}
.sidebar-header .logo svg{width:40px;height:40px;position:relative;z-index:1;border-radius:50%;display:block}
[data-theme="light"] .sidebar-header .logo{box-shadow:0 0 0 1px rgba(184,134,11,0.35),0 4px 16px rgba(184,134,11,0.12),0 8px 24px rgba(15,23,42,0.12)}
.brand-block{display:flex;flex-direction:column;gap:3px;min-width:0}
.brand-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.2}
.brand-title{font-size:17px;font-weight:700;letter-spacing:0.04em;background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 45%,#d4a853 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.brand-beta{font-size:8px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:linear-gradient(135deg,rgba(212,168,83,0.24),rgba(212,168,83,0.08));border:1px solid rgba(212,168,83,0.38);color:#e8c872;line-height:1.3;flex-shrink:0}
.brand-version{font-size:9px;font-weight:500;letter-spacing:0.08em;color:var(--text-muted);opacity:0.9;flex-shrink:0}
.brand-subtitle{font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#d4a853;opacity:0.9;line-height:1.2;white-space:nowrap}
[data-theme="light"] .brand-title{background:linear-gradient(135deg,#0f172a 0%,#334155 50%,#b8860b 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
[data-theme="light"] .brand-subtitle{color:#b8860b}
[data-theme="light"] .brand-beta{color:#9a7b2f;border-color:rgba(184,134,11,0.4);background:linear-gradient(135deg,rgba(184,134,11,0.18),rgba(184,134,11,0.06))}
.sidebar.collapsed .brand-block,.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-section{display:none}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 8px}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:12px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--text-secondary);transition:var(--transition);width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:var(--bg-card);color:var(--text-primary)}
.nav-item.active{background:rgba(20,184,166,0.15);color:var(--accent);font-weight:500}
.nav-item i{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:var(--transition)}
.sidebar.collapsed~.main{margin-left:72px}
.topbar{height:var(--topbar-h);background:var(--bg-glass);backdrop-filter:var(--blur);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
.search-box{flex:1;max-width:480px;position:relative}
.search-box input{width:100%;padding-left:40px;background:var(--bg-card)}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);max-height:400px;overflow-y:auto;display:none;z-index:200}
.search-results.open{display:block}
.search-group{padding:8px 0}
.search-group-title{font-size:11px;text-transform:uppercase;color:var(--text-muted);padding:4px 16px;font-weight:600}
.search-result-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--transition)}
.search-result-item:hover,.search-result-item.active{background:var(--bg-card)}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius-sm);font-weight:500;transition:var(--transition);white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary)}
.btn-secondary:hover{background:var(--bg-glass);border-color:var(--accent)}
.btn-danger{background:rgba(244,63,94,0.15);color:var(--expense);border:1px solid rgba(244,63,94,0.3)}
.btn-danger:hover{background:rgba(244,63,94,0.25)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:40px;height:40px;padding:0;justify-content:center;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border)}
.btn-icon:hover{background:var(--bg-glass);border-color:var(--accent)}
.content{flex:1;padding:24px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ========== CARDS & STATS ========== */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:24px;font-weight:700}
.page-subtitle{color:var(--text-secondary);font-size:14px;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:var(--transition);animation:fadeIn 0.4s ease backwards}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(20,184,166,0.3)}
.stat-card .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.stat-card .stat-label{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-card .stat-value{font-size:22px;font-weight:700;animation:countUp 0.6s ease}
.stat-card .stat-change{font-size:12px;margin-top:6px}
.stat-card.income .stat-icon{background:rgba(16,185,129,0.15);color:var(--income)}
.stat-card.expense .stat-icon{background:rgba(244,63,94,0.15);color:var(--expense)}
.stat-card.neutral .stat-icon{background:rgba(59,130,246,0.15);color:var(--info)}
.stat-card.warning .stat-icon{background:rgba(245,158,11,0.15);color:var(--warning)}
.stat-card.accent .stat-icon{background:rgba(20,184,166,0.15);color:var(--accent)}

.card{background:var(--bg-glass);backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:var(--transition)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.widgets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.widget{cursor:grab}
.widget.dragging{opacity:0.5}
.widget .drag-handle{color:var(--text-muted);cursor:grab;margin-right:8px}

/* ========== TABLES ========== */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:600;background:var(--bg-card);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--accent)}
th.sorted{color:var(--accent)}
td{font-size:13px}
tr:hover td{background:var(--bg-card)}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-income{background:rgba(16,185,129,0.15);color:var(--income)}
.badge-expense{background:rgba(244,63,94,0.15);color:var(--expense)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg-card);border:1px solid var(--border);margin:2px}
.amount-income{color:var(--income);font-weight:600}
.amount-expense{color:var(--expense);font-weight:600}
.actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.actions button:not(.btn){width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:var(--transition);background:var(--bg-card);border:1px solid var(--border)}
.actions button:not(.btn):hover{background:var(--bg-glass);color:var(--accent);border-color:rgba(20,184,166,0.35)}
.actions button:not(.btn):last-child:hover{color:var(--expense);border-color:rgba(244,63,94,0.35)}
.card-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
.card-toolbar .btn{min-height:34px;justify-content:center}
.card-toolbar .btn-pay{flex:1 1 100%;width:100%}
.card-toolbar .btn-edit{flex:1 1 auto}
.card-toolbar .btn-icon-only{width:34px;min-width:34px;padding:0;flex:0 0 34px}
.card-header .card-toolbar{margin-top:0;flex-wrap:nowrap;justify-content:flex-end}
.card-header .card-toolbar .btn-pay{flex:0 1 auto;width:auto}

/* ========== FORMS & FILTERS ========== */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;color:var(--text-secondary);font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%}
.filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:16px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}
.filters input,.filters select{min-width:140px;padding:8px 12px;font-size:13px}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px}
.pagination button{padding:8px 14px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border)}
.pagination button:disabled{opacity:0.4;cursor:not-allowed}
.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ========== PROGRESS ========== */
.progress-bar{height:8px;background:var(--bg-card);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.progress-fill.green{background:var(--income)}
.progress-fill.amber{background:var(--warning)}
.progress-fill.red{background:var(--expense)}
.progress-ring{position:relative;display:inline-flex}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:6;stroke-linecap:round}
.progress-ring .bg{stroke:var(--bg-card)}
.progress-ring .fg{stroke:var(--accent);transition:stroke-dashoffset 0.6s ease}
.progress-ring .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}

/* ========== MODALS & TOASTS ========== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);animation:fadeIn 0.2s ease}
.modal.lg{max-width:800px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:var(--radius-sm);background:var(--bg-secondary);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;min-width:280px;animation:slideIn 0.3s ease}
.toast.success{border-left:3px solid var(--income)}
.toast.error{border-left:3px solid var(--expense)}
.toast.info{border-left:3px solid var(--info)}
.toast.warning{border-left:3px solid var(--warning)}
.toast button{margin-left:auto;color:var(--text-muted)}

/* ========== FAB & EMPTY STATES ========== */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(20,184,166,0.4);z-index:90;transition:var(--transition)}
.fab:hover{transform:scale(1.08)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state i{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-state h3{font-size:18px;color:var(--text-secondary);margin-bottom:8px}
.empty-state p{margin-bottom:20px}

/* ========== CALENDAR ========== */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-header{text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);padding:8px}
.cal-day{aspect-ratio:1;border-radius:var(--radius-sm);border:1px solid var(--border);padding:6px;cursor:pointer;transition:var(--transition);position:relative;font-size:13px}
.cal-day:hover{background:var(--bg-card)}
.cal-day.today{border-color:var(--accent);background:rgba(20,184,166,0.1)}
.cal-day.other-month{opacity:0.3}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.tx{background:var(--info)}
.cal-dot.bill{background:var(--expense)}
.cal-dot.income{background:var(--income)}
.cal-dot.goal{background:var(--accent)}

/* ========== HEATMAP ========== */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-cell{aspect-ratio:1;border-radius:4px;min-height:20px;transition:var(--transition)}
.heatmap-cell:hover{transform:scale(1.1)}

/* ========== HEALTH SCORE ========== */
.health-score{display:flex;align-items:center;gap:20px}
.health-circle{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;border:4px solid var(--accent);background:var(--bg-card)}
.health-details{flex:1}
.health-bar{margin:6px 0}
.health-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}

/* ========== CHARTS ========== */
.chart-container{position:relative;height:280px;margin:16px 0}
.chart-container.sm{height:180px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text-secondary);transition:var(--transition)}
.tab:hover{color:var(--text-primary)}
.tab.active{background:var(--accent);color:#fff}

/* ========== SHORTCUTS OVERLAY ========== */
.shortcuts-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;display:none;align-items:center;justify-content:center}
.shortcuts-overlay.open{display:flex}
.shortcuts-panel{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:480px;width:90%}
.shortcut-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.shortcut-row kbd{background:var(--bg-card);padding:4px 8px;border-radius:4px;font-size:12px;border:1px solid var(--border)}

/* ========== LOADING ========== */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-glass) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm);height:20px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ========== INSIGHTS ========== */
.insight{padding:12px 16px;border-radius:var(--radius-sm);background:var(--bg-card);border-left:3px solid var(--accent);margin-bottom:8px;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.insight i{color:var(--accent);margin-top:2px}

/* ========== CRYPTO PORTFOLIO ========== */
.coin-logo{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle}
.coin-logo.sm{width:22px;height:22px}
.coin-autocomplete-wrap{position:relative}
.coin-autocomplete-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);max-height:240px;overflow-y:auto;z-index:1100;display:none}
.coin-autocomplete-results.open{display:block}
.coin-result-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--transition)}
.coin-result-item:hover{background:var(--bg-card)}
.coin-selected-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:8px}

<script>
/* ============================================================
   PERSONAL FINANCE MANAGER — JavaScript
   ============================================================ */

const APP_VERSION = '0.14';

// ========== UTILITIES ==========
const Utils = {
  /** Generate unique ID */
  uid() { return crypto.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).slice(2); },

  /** Debounce function calls */
  debounce(fn, ms = 300) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; },

  /** Format currency based on settings */
  formatMoney(amount, settings) {
    const sym = { USD: '$', EUR: '€', GBP: '£', SAR: '﷼', JPY: '¥', CAD: 'C$', AUD: 'A$', ILS: '₪' }[settings?.currency || 'USD'] || '$';
    const n = Math.abs(amount || 0);
    const fmt = settings?.numberFormat === '1.234,56'
      ? n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return (amount < 0 ? '-' : '') + sym + fmt;
  },

  /** Format date based on settings */
  formatDate(d, settings) {
    if (!d) return '';
    const date = new Date(d);
    if (isNaN(date)) return d;
    const fmt = settings?.dateFormat || 'MM/DD/YYYY';
    const pad = n => String(n).padStart(2, '0');
    const map = { YYYY: date.getFullYear(), MM: pad(date.getMonth() + 1), DD: pad(date.getDate()) };
    return fmt.replace(/YYYY|MM|DD/g, m => map[m]);
  },

  /** Parse date string to ISO */
  toISO(d) { return d ? new Date(d).toISOString().split('T')[0] : ''; },

  /** Days until ISO date from today (negative = overdue) */
  daysUntil(isoDate) {
    if (!isoDate) return null;
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const target = new Date(isoDate + 'T00:00:00');
    return Math.ceil((target - today) / 86400000);
  },

  /** Advance ISO date by one calendar month (clamp day if needed) */
  advanceMonthlyDate(isoDate) {
    if (!isoDate) return null;
    const d = new Date(isoDate + 'T00:00:00');
    const day = d.getDate();
    d.setMonth(d.getMonth() + 1);
    if (d.getDate() !== day) d.setDate(0);
    return Utils.toISO(d);
  },

  /** Build next payment date from legacy day-of-month */
  nextDateFromDay(dayOfMonth) {
    const now = new Date();
    let target = new Date(now.getFullYear(), now.getMonth(), dayOfMonth);
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (target < today) target.setMonth(target.getMonth() + 1);
    return Utils.toISO(target);
  },

  /** Check if date falls on payment day in calendar month (exact or recurring day-of-month) */
  isPaymentDay(dateStr, nextPaymentDate, calMonth) {
    if (!nextPaymentDate) return false;
    if (dateStr === nextPaymentDate) return true;
    const payDay = parseInt(nextPaymentDate.split('-')[2], 10);
    const calDay = parseInt(dateStr.split('-')[2], 10);
    return calDay === payDay && Utils.monthKey(dateStr) === Utils.monthKey(calMonth);
  },

  /** Get start/end of period */
  periodRange(period) {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
    const day = now.getDay();
    switch (period) {
      case 'today':
      case 'daily': return [Utils.toISO(now), Utils.toISO(now)];
      case 'week': { const s = new Date(now); s.setDate(d - day); return [Utils.toISO(s), Utils.toISO(now)]; }
      case 'month':
      case 'monthly': return [Utils.toISO(new Date(y, m, 1)), Utils.toISO(new Date(y, m + 1, 0))];
      case 'year':
      case 'yearly': return [Utils.toISO(new Date(y, 0, 1)), Utils.toISO(new Date(y, 11, 31))];
      default: return [period.start, period.end];
    }
  },

  /** Month key YYYY-MM */
  monthKey(d) { const dt = new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`; },

  /** Escape HTML */
  esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; },

  /** Download blob */
  download(filename, content, type = 'application/json') {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type }));
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  },

  /** Animate count up */
  animateValue(el, end, duration = 800, prefix = '') {
    const start = 0; const startTime = performance.now();
    const step = (now) => {
      const p = Math.min((now - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      el.textContent = prefix + Math.round(start + (end - start) * ease).toLocaleString();
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = prefix + end.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    };
    requestAnimationFrame(step);
  }
};

// ========== TOAST MANAGER ==========
class ToastManager {
  constructor() { this.container = document.getElementById('toastContainer'); }

  /** Show toast notification */
  show(message, type = 'info', duration = 4000, action = null) {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle', warning: 'exclamation-triangle' };
    t.innerHTML = `<i class="fas fa-${icons[type]}"></i><span>${Utils.esc(message)}</span>`;
    if (action) {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm btn-secondary';
      btn.textContent = action.label;
      btn.onclick = () => { action.fn(); t.remove(); };
      t.appendChild(btn);
    }
    const close = document.createElement('button');
    close.innerHTML = '<i class="fas fa-times"></i>';
    close.onclick = () => t.remove();
    t.appendChild(close);
    this.container.appendChild(t);
    if (duration > 0) setTimeout(() => t.remove(), duration);
    return t;
  }
}

// ========== MODAL MANAGER ==========
class ModalManager {
  constructor() {
    this.overlay = document.getElementById('modalOverlay');
    this.modal = document.getElementById('modal');
    this.title = document.getElementById('modalTitle');
    this.body = document.getElementById('modalBody');
    this.footer = document.getElementById('modalFooter');
    document.getElementById('modalClose').onclick = () => this.close();
    this.overlay.onclick = (e) => { if (e.target === this.overlay) this.close(); };
  }

  /** Open modal with content */
  open(title, bodyHTML, footerHTML = '', large = false) {
    this.title.textContent = title;
    this.body.innerHTML = bodyHTML;
    this.footer.innerHTML = footerHTML;
    this.modal.classList.toggle('lg', large);
    this.overlay.classList.add('open');
  }

  /** Close modal */
  close() { this.overlay.classList.remove('open'); }

  /** Confirm dialog */
  confirm(title, message) {
    return new Promise(resolve => {
      const ov = document.getElementById('confirmOverlay');
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmBody').textContent = message;
      ov.classList.add('open');
      const ok = () => { ov.classList.remove('open'); cleanup(); resolve(true); };
      const cancel = () => { ov.classList.remove('open'); cleanup(); resolve(false); };
      const cleanup = () => {
        document.getElementById('confirmOk').removeEventListener('click', ok);
        document.getElementById('confirmCancel').removeEventListener('click', cancel);
      };
      document.getElementById('confirmOk').addEventListener('click', ok);
      document.getElementById('confirmCancel').addEventListener('click', cancel);
    });
  }
}

// ========== CHART MANAGER ==========
class ChartManager {
  constructor() { this.charts = {}; }

  /** Destroy chart by id */
  destroy(id) { if (this.charts[id]) { this.charts[id].destroy(); delete this.charts[id]; } }

  /** Destroy all charts */
  destroyAll() { Object.keys(this.charts).forEach(k => this.destroy(k)); }

  /** Get theme colors from CSS */
  colors() {
    const s = getComputedStyle(document.documentElement);
    return {
      text: s.getPropertyValue('--text-secondary').trim() || '#94a3b8',
      grid: s.getPropertyValue('--border').trim() || 'rgba(255,255,255,0.08)',
      accent: s.getPropertyValue('--accent').trim() || '#14b8a6',
      income: s.getPropertyValue('--income').trim() || '#10b981',
      expense: s.getPropertyValue('--expense').trim() || '#f43f5e',
      palette: ['#14b8a6', '#6366f1', '#f59e0b', '#f43f5e', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899']
    };
  }

  /** Create or update chart */
  render(id, canvas, type, data, options = {}) {
    this.destroy(id);
    const c = this.colors();
    const defaults = {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: c.text, font: { family: 'Inter' } } } },
      scales: type !== 'doughnut' && type !== 'pie' ? {
        x: { ticks: { color: c.text }, grid: { color: c.grid } },
        y: { ticks: { color: c.text }, grid: { color: c.grid } }
      } : {}
    };
    this.charts[id] = new Chart(canvas, { type, data, options: { ...defaults, ...options } });
    return this.charts[id];
  }
}

// ========== CRYPTO PRICE PROVIDER (abstract) ==========
class CryptoPriceProvider {
  /** Fetch full coin list */
  async getCoinList(forceRefresh) { throw new Error('Not implemented'); }
  /** Search coins for autocomplete */
  async searchCoins(query) { throw new Error('Not implemented'); }
  /** Batch fetch live prices by CoinGecko IDs */
  async getPrices(coinIds, vsCurrency, forceRefresh) { throw new Error('Not implemented'); }
  /** API connectivity check */
  async ping() { throw new Error('Not implemented'); }
}

// ========== COINGECKO PROVIDER ==========
class CoinGeckoProvider extends CryptoPriceProvider {
  constructor(getApiKey) {
    super();
    this.getApiKey = getApiKey;
    this.rateLimitUntil = 0;
    this.COINLIST_KEY = 'pfm_coingecko_coinlist';
    this.PRICES_KEY = 'pfm_coingecko_prices';
    this.COINLIST_TTL = 24 * 60 * 60 * 1000;
    this.PRICES_TTL = 30 * 1000;
    this.BASE = 'https://api.coingecko.com/api/v3';
    this.DEFAULT_KEY = 'CG-Ad8xnLwey3az1T5kbLHmcJkH';
  }

  /** Resolve API key from settings or default */
  _apiKey() { return this.getApiKey() || this.DEFAULT_KEY; }

  /** Classify fetch errors for user-friendly handling */
  _classifyError(err, status) {
    if (status === 429) return { type: 'rate_limited', message: 'CoinGecko rate limit reached. Using cached prices.' };
    if (err?.name === 'AbortError') return { type: 'timeout', message: 'Request timed out. Using cached prices.' };
    if (!navigator.onLine) return { type: 'offline', message: 'No internet connection.' };
    if (status === 404) return { type: 'not_found', message: 'Coin not found.' };
    return { type: 'unknown', message: 'Unable to reach CoinGecko.' };
  }

  /** HTTP fetch wrapper with timeout and auth header */
  async _fetch(path, params = {}) {
    if (Date.now() < this.rateLimitUntil) {
      throw Object.assign(new Error('Rate limited'), { type: 'rate_limited' });
    }
    const url = new URL(this.BASE + path);
    Object.entries(params).forEach(([k, v]) => { if (v != null && v !== '') url.searchParams.set(k, v); });
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    try {
      const res = await fetch(url.toString(), {
        signal: controller.signal,
        headers: { Accept: 'application/json', 'x-cg-demo-api-key': this._apiKey() }
      });
      clearTimeout(timeout);
      if (res.status === 429) {
        this.rateLimitUntil = Date.now() + 5 * 60 * 1000;
        throw Object.assign(new Error('Rate limited'), { type: 'rate_limited', status: 429 });
      }
      if (!res.ok) {
        const info = this._classifyError(null, res.status);
        throw Object.assign(new Error(info.message), { type: info.type, status: res.status });
      }
      return await res.json();
    } catch (e) {
      clearTimeout(timeout);
      if (e.type) throw e;
      const info = this._classifyError(e, 0);
      throw Object.assign(new Error(info.message), { type: info.type });
    }
  }

  /** Ping CoinGecko API */
  async ping() { await this._fetch('/ping'); return true; }

  /** Get coin list with 24h localStorage cache */
  async getCoinList(forceRefresh = false) {
    try {
      if (!forceRefresh) {
        const raw = localStorage.getItem(this.COINLIST_KEY);
        if (raw) {
          const cached = JSON.parse(raw);
          if (Date.now() - cached.fetchedAt < this.COINLIST_TTL) return cached.coins;
        }
      }
    } catch (e) { /* use network */ }
    const coins = await this._fetch('/coins/list');
    localStorage.setItem(this.COINLIST_KEY, JSON.stringify({ fetchedAt: Date.now(), coins }));
    return coins;
  }

  /** Filter cached coin list offline fallback */
  _filterCachedCoins(query) {
    try {
      const raw = localStorage.getItem(this.COINLIST_KEY);
      if (!raw) return [];
      const { coins } = JSON.parse(raw);
      const q = query.toLowerCase();
      return coins.filter(c =>
        c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)
      ).slice(0, 10).map(c => ({ id: c.id, name: c.name, symbol: c.symbol.toUpperCase(), thumb: null }));
    } catch (e) { return []; }
  }

  /** Search coins via API with logo; falls back to cached list */
  async searchCoins(query) {
    if (!query || query.length < 1) return [];
    try {
      const data = await this._fetch('/search', { query });
      return (data.coins || []).slice(0, 10).map(c => ({
        id: c.id, name: c.name, symbol: (c.symbol || '').toUpperCase(), thumb: c.thumb || c.large || null
      }));
    } catch (e) {
      return this._filterCachedCoins(query);
    }
  }

  /** Batch fetch prices for all coin IDs in one request */
  async getPrices(coinIds, vsCurrency = 'usd', forceRefresh = false) {
    if (!coinIds.length) return {};
    const vs = (vsCurrency || 'usd').toLowerCase();
    if (!forceRefresh) {
      try {
        const raw = localStorage.getItem(this.PRICES_KEY);
        if (raw) {
          const cached = JSON.parse(raw);
          if (Date.now() - cached.fetchedAt < this.PRICES_TTL && cached.vsCurrency === vs) {
            const allPresent = coinIds.every(id => cached.prices[id] != null);
            if (allPresent) return cached.prices;
          }
        }
      } catch (e) { /* fetch fresh */ }
    }
    const unique = [...new Set(coinIds)];
    const prices = {};
    for (let i = 0; i < unique.length; i += 250) {
      const chunk = unique.slice(i, i + 250);
      const data = await this._fetch('/simple/price', {
        ids: chunk.join(','),
        vs_currencies: vs,
        include_last_updated_at: 'true'
      });
      chunk.forEach(id => {
        const entry = data[id];
        if (entry && entry[vs] != null) {
          prices[id] = { price: entry[vs], lastUpdatedAt: entry.last_updated_at || null };
        }
      });
    }
    localStorage.setItem(this.PRICES_KEY, JSON.stringify({ fetchedAt: Date.now(), vsCurrency: vs, prices }));
    return prices;
  }

  /** Get age of coin list cache in ms */
  getCoinListCacheAge() {
    try {
      const raw = localStorage.getItem(this.COINLIST_KEY);
      if (!raw) return null;
      return Date.now() - JSON.parse(raw).fetchedAt;
    } catch (e) { return null; }
  }

  /** Force clear price cache */
  clearPriceCache() { localStorage.removeItem(this.PRICES_KEY); }
}

// ========== CRYPTO PORTFOLIO SERVICE ==========
class CryptoPortfolioService {
  constructor(store, provider, toast) {
    this.store = store;
    this.provider = provider;
    this.toast = toast;
    this.priceMap = {};
    this.loading = false;
    this.refreshInterval = null;
  }

  /** Map app currency to CoinGecko vs_currency */
  getVsCurrency() {
    const supported = ['usd', 'eur', 'gbp', 'jpy', 'cad', 'aud', 'sar', 'ils'];
    const vs = (this.store.settings.currency || 'USD').toLowerCase();
    return supported.includes(vs) ? vs : 'usd';
  }

  /** Get cached live price for a coin */
  getLivePrice(coinGeckoId) { return this.priceMap[coinGeckoId]?.price ?? null; }

  /** Compute metrics for a single holding */
  computeHolding(holding, portfolioTotal) {
    const amount = holding.amount || 0;
    const avgBuy = holding.avgBuyPrice || 0;
    const totalCost = amount * avgBuy;
    const livePrice = this.getLivePrice(holding.coinGeckoId);
    const currentValue = livePrice != null ? amount * livePrice : null;
    const profitLoss = currentValue != null ? currentValue - totalCost : null;
    const roiPct = totalCost > 0 && profitLoss != null ? (profitLoss / totalCost) * 100 : null;
    const allocationPct = portfolioTotal > 0 && currentValue != null ? (currentValue / portfolioTotal) * 100 : null;
    return { totalCost, livePrice, currentValue, profitLoss, profitLossPct: roiPct, roiPct, allocationPct };
  }

  /** Total live portfolio value */
  getPortfolioTotalValue() {
    return (this.store.data.cryptoHoldings || []).reduce((s, h) => {
      const p = this.getLivePrice(h.coinGeckoId);
      return p != null ? s + h.amount * p : s;
    }, 0);
  }

  /** Compute portfolio summary for dashboard cards */
  computePortfolioSummary() {
    const holdings = this.store.data.cryptoHoldings || [];
    let totalValue = 0;
    const rows = holdings.map(h => {
      const m = this.computeHolding(h, 0);
      if (m.currentValue != null) totalValue += m.currentValue;
      return { holding: h, ...m };
    });
    rows.forEach(r => {
      r.allocationPct = totalValue > 0 && r.currentValue != null ? (r.currentValue / totalValue) * 100 : null;
    });
    const totalInvested = rows.reduce((s, r) => s + r.totalCost, 0);
    const totalPL = totalValue - totalInvested;
    const roiPct = totalInvested > 0 ? (totalPL / totalInvested) * 100 : 0;
    let best = null, worst = null, largest = null;
    rows.forEach(r => {
      if (r.roiPct != null) {
        if (!best || r.roiPct > best.roiPct) best = r;
        if (!worst || r.roiPct < worst.roiPct) worst = r;
      }
      if (!largest || (r.currentValue || 0) > (largest.currentValue || 0)) largest = r;
    });
    const meta = this.store.data.cryptoMeta || {};
    return { totalValue, totalInvested, totalPL, roiPct, count: holdings.length, best, worst, largest, rows, lastUpdated: meta.lastPriceUpdate, apiStatus: meta.apiStatus || 'unknown' };
  }

  /** Update API status in store */
  updateApiStatus(status, error = null) {
    if (!this.store.data.cryptoMeta) this.store.data.cryptoMeta = {};
    this.store.data.cryptoMeta.apiStatus = status;
    this.store.data.cryptoMeta.lastApiError = error;
    this.store.notify();
  }

  /** Load stale prices from localStorage cache */
  _loadCachedPrices() {
    try {
      const raw = localStorage.getItem('pfm_coingecko_prices');
      if (raw) Object.assign(this.priceMap, JSON.parse(raw).prices || {});
    } catch (e) { /* ignore */ }
  }

  /** Refresh all holding prices in one batched API call */
  async refreshPrices(force = false, silent = false) {
    const holdings = this.store.data.cryptoHoldings || [];
    if (!holdings.length) return;
    if (this.loading && !force) return;
    this.loading = true;
    try {
      await this.provider.ping().catch(() => {});
      const ids = [...new Set(holdings.map(h => h.coinGeckoId))];
      const prices = await this.provider.getPrices(ids, this.getVsCurrency(), force);
      Object.assign(this.priceMap, prices);
      ids.forEach(id => {
        if (this.priceMap[id] == null) this._loadCachedPrices();
      });
      if (!this.store.data.cryptoMeta) this.store.data.cryptoMeta = {};
      this.store.data.cryptoMeta.lastPriceUpdate = new Date().toISOString();
      this.store.data.cryptoMeta.apiStatus = 'online';
      this.store.data.cryptoMeta.lastApiError = null;
      this.store.notify();
    } catch (e) {
      this._loadCachedPrices();
      const type = e.type || 'unknown';
      const status = type === 'rate_limited' ? 'rate_limited' : (type === 'offline' || type === 'network' ? 'offline' : 'error');
      this.updateApiStatus(status, e.message);
      if (!silent) this.toast.show(e.message || 'Unable to refresh crypto prices', type === 'rate_limited' ? 'warning' : 'error', 5000);
    } finally {
      this.loading = false;
    }
  }

  /** Start 60-second auto price refresh */
  startAutoRefresh() {
    this.stopAutoRefresh();
    if (this.store.settings.cryptoAutoRefresh === false) return;
    this.refreshInterval = setInterval(() => this.refreshPrices(false, true), 60000);
  }

  /** Stop auto refresh timer */
  stopAutoRefresh() {
    if (this.refreshInterval) { clearInterval(this.refreshInterval); this.refreshInterval = null; }
  }

  /** Prefetch coin list on startup */
  async initCoinList() {
    try {
      await this.provider.getCoinList(false);
    } catch (e) {
      if (!navigator.onLine) this.updateApiStatus('offline', 'No internet connection');
    }
  }

  /** Sort comparator for holdings table */
  getSortComparator(field, dir) {
    const mult = dir === 'asc' ? 1 : -1;
    return (a, b) => {
      const ha = a.holding, hb = b.holding;
      let va, vb;
      switch (field) {
        case 'profit': va = a.profitLoss ?? 0; vb = b.profitLoss ?? 0; break;
        case 'roi': va = a.roiPct ?? 0; vb = b.roiPct ?? 0; break;
        case 'value': va = a.currentValue ?? 0; vb = b.currentValue ?? 0; break;
        case 'invested': va = a.totalCost; vb = b.totalCost; break;
        case 'amount': va = ha.amount; vb = hb.amount; break;
        default: return mult * ha.name.localeCompare(hb.name);
      }
      return mult * (va - vb);
    };
  }
}

class FinanceStore {

    this.KEY = 'pfm_v1';
    this.data = null;
    this.listeners = [];
    this.saveDebounced = Utils.debounce(() => this._persist(), 300);
  }

  /** Load data from localStorage or create defaults */
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      this.data = raw ? JSON.parse(raw) : this._createDefault();
      if (!this.data.version) this.data.version = 1;
      this._migrate();
      this._processRecurring();
      return this.data;
    } catch (e) {
      this.data = this._createDefault();

  /** Migrate schema to latest version */
  _migrate() {
    if (!this.data.cryptoHoldings) this.data.cryptoHoldings = [];
    if (!this.data.cryptoMeta) this.data.cryptoMeta = { lastPriceUpdate: null, apiStatus: 'unknown', lastApiError: null };

// ========== FINANCE CALCULATOR ==========
class FinanceCalculator {
  constructor(store, cryptoService = null) { this.store = store; this.cryptoService = cryptoService; }

  /** Get account balance from transactions */
  accountBalance(accountId) {
    const acc = this.store.get('accounts', accountId);
    if (!acc) return 0;
    let bal = acc.openingBalance || 0;
    this.store.data.transactions.forEach(t => {
      if (t.accountId === accountId) bal += t.type === 'income' ? t.amount : -t.amount;
      if (t.transferTo === accountId) bal += t.amount;
      if (t.transferFrom === accountId) bal -= t.amount;
    });
    return bal;
  }

  /** Total balance across all accounts */
  totalBalance() { return this.store.data.accounts.reduce((s, a) => s + this.accountBalance(a.id), 0); }

  /** Cash balance */
  cashBalance() { const a = this.store.data.accounts.find(a => a.type === 'cash'); return a ? this.accountBalance(a.id) : 0; }

  /** Bank accounts total */
  bankTotal() { return this.store.data.accounts.filter(a => a.type === 'bank').reduce((s, a) => s + this.accountBalance(a.id), 0); }

  /** Credit card debt total */
  ccDebt() { return this.store.data.creditCards.reduce((s, c) => s + (c.balance || 0), 0); }

  /** Loans total */
  loansTotal() { return this.store.data.loans.reduce((s, l) => s + (l.currentBalance || 0), 0); }

  /** Investments total (manual entries only) */
  investmentsTotal() { return this.store.data.investments.reduce((s, i) => s + (i.currentValue || 0), 0); }

  /** Live crypto portfolio total */
  cryptoTotal() { return this.cryptoService ? this.cryptoService.getPortfolioTotalValue() : 0; }

  /** Assets total */
  assetsTotal() { return this.store.data.assets.reduce((s, a) => s + (a.currentValue || 0), 0); }

  /** Monthly income/expenses for given month */
  monthlyFlow(monthKey) {
    const txs = this.store.data.transactions.filter(t => Utils.monthKey(t.date) === monthKey);
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expenses = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    return { income, expenses, savings: income - expenses };
  }

  /** Current month flow */
  currentMonthFlow() { return this.monthlyFlow(Utils.monthKey(new Date())); }

  /** Net worth including live crypto */
  netWorth() { return this.totalBalance() + this.investmentsTotal() + this.cryptoTotal() + this.assetsTotal() - this.ccDebt() - this.loansTotal(); }

  /** Debt ratio */
  debtRatio() {
    const debt = this.ccDebt() + this.loansTotal();
    const nw = this.netWorth();
    if (nw > 0) return (debt / (nw + debt)) * 100;
    const flow = this.currentMonthFlow();
    return flow.income > 0 ? (debt / (flow.income * 12)) * 100 : 0;
  }

  /** Investment ROI */
  investmentROI(inv) {
    const cost = (inv.purchasePrice || 0) * (inv.quantity || 1);
    if (!cost) return 0;
    return ((inv.currentValue - cost) / cost) * 100;
  }

  /** Loan amortization schedule */
  amortization(principal, annualRate, months) {
    const r = annualRate / 100 / 12;
    const payment = r > 0 ? principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1) : principal / months;
    const schedule = [];
    let balance = principal, totalInterest = 0;
    for (let i = 1; i <= months; i++) {
      const interest = balance * r;
      const principalPaid = payment - interest;
      balance = Math.max(0, balance - principalPaid);
      totalInterest += interest;
      schedule.push({ month: i, payment, principal: principalPaid, interest, balance });
    }
    return { payment, schedule, totalInterest };
  }

  /** Cash flow buckets */
  cashFlowBuckets(period) {
    let start, end;
    if (period === 'daily') {
      end = Utils.toISO(new Date());
      const s = new Date(); s.setDate(s.getDate() - 29);
      start = Utils.toISO(s);
    } else {
      [start, end] = Utils.periodRange(period);
    }
    const txs = this.store.data.transactions.filter(t => t.date >= start && t.date <= end);
    const buckets = {};
    txs.forEach(t => {
      let key = t.date;
      if (period === 'year' || period === 'yearly') key = Utils.monthKey(t.date);
      else if (period === 'week') {
        const dt = new Date(t.date);
        const ws = new Date(dt); ws.setDate(dt.getDate() - dt.getDay());
        key = 'W' + Utils.toISO(ws).slice(5);
      } else if (period === 'monthly' || period === 'month') key = Utils.monthKey(t.date);
      if (!buckets[key]) buckets[key] = { income: 0, expense: 0 };
      if (t.type === 'income') buckets[key].income += t.amount;
      else buckets[key].expense += t.amount;
    });
    return buckets;
  }

  /** Category spending for period */
  categorySpending(start, end, type = 'expense') {
    const map = {};
    this.store.data.transactions.filter(t => t.date >= start && t.date <= end && t.type === type).forEach(t => {
      const cat = this.store.data.categories.find(c => c.id === t.categoryId)?.name || 'Other';
      map[cat] = (map[cat] || 0) + t.amount;
    });
    return map;
  }

  /** Budget spent for category/month */
  budgetSpent(categoryId, month) {
    return this.store.data.transactions
      .filter(t => t.categoryId === categoryId && Utils.monthKey(t.date) === month && t.type === 'expense')
      .reduce((s, t) => s + t.amount, 0);
  }

  /** Financial health score 0-100 */
  healthScore() {
    const flow = this.currentMonthFlow();
    const savingsRate = flow.income > 0 ? Math.min(100, (flow.savings / flow.income) * 100 * 4) : 0;
    const debt = this.ccDebt() + this.loansTotal();
    const dti = flow.income > 0 ? Math.max(0, 100 - (debt / (flow.income * 12)) * 100) : 50;
    const budgets = this.store.data.budgets.filter(b => b.month === Utils.monthKey(new Date()));
    const budgetScore = budgets.length ? budgets.reduce((s, b) => {
      const spent = this.budgetSpent(b.categoryId, b.month);
      return s + (spent <= b.amount ? 100 : Math.max(0, 100 - ((spent - b.amount) / b.amount) * 100));
    }, 0) / budgets.length : 70;
    const emergency = this.store.data.savingsGoals.find(g => g.name.toLowerCase().includes('emergency'));
    const emergencyScore = emergency ? Math.min(100, (emergency.currentAmount / emergency.targetAmount) * 100) : 30;
    const prevMonth = new Date(); prevMonth.setMonth(prevMonth.getMonth() - 1);
    const prevFlow = this.monthlyFlow(Utils.monthKey(prevMonth));
    const growthScore = prevFlow.income > 0 ? Math.min(100, Math.max(0, 50 + ((flow.savings - prevFlow.savings) / prevFlow.income) * 100)) : 50;
    return Math.round(savingsRate * 0.25 + dti * 0.25 + budgetScore * 0.20 + emergencyScore * 0.15 + growthScore * 0.15);
  }

  /** Statistics */
  statistics() {
    const txs = this.store.data.transactions;
    const expenses = txs.filter(t => t.type === 'expense');
    const incomes = txs.filter(t => t.type === 'income');
    const now = new Date();
    const monthStart = Utils.toISO(new Date(now.getFullYear(), now.getMonth(), 1));
    const monthExp = expenses.filter(t => t.date >= monthStart);
    const daysInMonth = now.getDate();
    const catSpend = this.categorySpending(monthStart, Utils.toISO(now));
    const topCat = Object.entries(catSpend).sort((a, b) => b[1] - a[1])[0];
    return {
      avgDaily: daysInMonth ? monthExp.reduce((s, t) => s + t.amount, 0) / daysInMonth : 0,
      avgMonthly: expenses.length ? expenses.reduce((s, t) => s + t.amount, 0) / Math.max(1, new Set(expenses.map(t => Utils.monthKey(t.date))).size) : 0,
      highestExpense: expenses.length ? Math.max(...expenses.map(t => t.amount)) : 0,
      highestIncome: incomes.length ? Math.max(...incomes.map(t => t.amount)) : 0,
      largestCategory: topCat ? topCat[0] : 'N/A',
      savingsRate: this.currentMonthFlow().income > 0 ? (this.currentMonthFlow().savings / this.currentMonthFlow().income * 100).toFixed(1) : 0,
      debtRatio: this.debtRatio().toFixed(1),
      netWorth: this.netWorth(),
      healthScore: this.healthScore()
    };
  }
}

// ========== INSIGHT ENGINE ==========
class InsightEngine {
  constructor(store, calc) { this.store = store; this.calc = calc; }

  /** Generate smart insights */
  generate() {
    const insights = [];
    const flow = this.calc.currentMonthFlow();
    const prev = new Date(); prev.setMonth(prev.getMonth() - 1);
    const prevFlow = this.calc.monthlyFlow(Utils.monthKey(prev));
    if (prevFlow.expenses > 0) {
      const pct = ((flow.expenses - prevFlow.expenses) / prevFlow.expenses * 100).toFixed(0);
      if (Math.abs(pct) >= 5) insights.push({ icon: 'chart-line', text: `You spent ${Math.abs(pct)}% ${pct > 0 ? 'more' : 'less'} this month compared to last.` });
    }
    if (prevFlow.income > 0 && flow.savings > prevFlow.savings) {
      const pct = ((flow.savings - prevFlow.savings) / Math.abs(prevFlow.savings || 1) * 100).toFixed(0);
      insights.push({ icon: 'piggy-bank', text: `Your savings increased by ${pct}%.` });
    }
    this.store.data.savingsGoals.forEach(g => {
      const pct = ((g.currentAmount / g.targetAmount) * 100).toFixed(0);
      if (pct > 0) insights.push({ icon: 'bullseye', text: `You are ${pct}% toward your ${g.name} goal.` });
    });
    const restCat = this.store.data.categories.find(c => c.name === 'Restaurants');
    if (restCat) {
      const [s, e] = Utils.periodRange('month');
      const spent = this.calc.categorySpending(s, e)['Restaurants'] || 0;
      const [ps, pe] = [Utils.monthKey(prev) + '-01', Utils.monthKey(prev) + '-31'];
      const prevSpent = this.store.data.transactions.filter(t => t.categoryId === restCat.id && t.date >= ps && t.date <= pe).reduce((s, t) => s + t.amount, 0);
      if (prevSpent > 0 && spent > prevSpent) {
        const pct = ((spent - prevSpent) / prevSpent * 100).toFixed(0);
        insights.push({ icon: 'utensils', text: `You spent ${pct}% more on restaurants this month.` });
      }
    }
    if (insights.length === 0) insights.push({ icon: 'info-circle', text: 'Add transactions to unlock personalized insights.' });
    return insights;
  }
}

      if (e.key === 'Escape') { this.modal.close(); document.getElementById('shortcutsOverlay').classList.remove('open'); document.getElementById('searchResults').classList.remove('open'); }

  /** Widget: expense heatmap */
  widgetHeatmap() {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    const days = new Date(y, m + 1, 0).getDate();
    const daily = {};
    this.store.data.transactions.filter(t => t.type === 'expense' && Utils.monthKey(t.date) === Utils.monthKey(now)).forEach(t => { daily[t.date] = (daily[t.date] || 0) + t.amount; });
    const max = Math.max(...Object.values(daily), 1);
    let html = '<div class="heatmap">';
    for (let d = 1; d <= days; d++) {
      const key = Utils.toISO(new Date(y, m, d));
      const v = daily[key] || 0;
      const intensity = v / max;
      const color = v ? `rgba(244,63,94,${0.15 + intensity * 0.85})` : 'var(--bg-card)';
      html += `<div class="heatmap-cell" style="background:${color}" title="${Utils.formatDate(key, this.store.settings)}: ${this.$(v)}"></div>`;

  /** Init drag-and-drop widget ordering */
  initWidgetDnD() {
    const grid = document.getElementById('widgetsGrid');
    if (!grid) return;
    let dragged = null;
    grid.querySelectorAll('.widget').forEach(w => {
      w.ondragstart = () => { dragged = w; w.classList.add('dragging'); };
      w.ondragend = () => { w.classList.remove('dragging'); dragged = null; };
      w.ondragover = e => { e.preventDefault(); };
      w.ondrop = e => {
        e.preventDefault();
        if (dragged && dragged !== w) {
          const nodes = [...grid.children];
          const from = nodes.indexOf(dragged), to = nodes.indexOf(w);
          if (from < to) w.after(dragged); else w.before(dragged);
          this.store.updateSettings({ widgetOrder: [...grid.children].map(c => c.dataset.widget) });
        }
      };
    });
  }

    this.store.data.creditCards.forEach(c => {

      if (days != null && days >= 0 && days <= 3) this.toast.show(`${c.name} payment due in ${days} day(s)`, 'warning', 6000);
    });
    this.store.data.loans.forEach(l => {
      const days = Utils.daysUntil(l.nextPaymentDate);
      if (days != null && days >= 0 && days <= 3) this.toast.show(`${l.name} payment due in ${days} day(s)`, 'warning', 6000);
    });
  }

  // ========== TRANSACTIONS ==========
  /** Render transactions view */
  renderTransactions() {
    let txs = this.getFilteredTransactions();
    const total = txs.length;
    const { page, perPage, sort, dir } = this.txState;
    txs.sort((a, b) => { let va = a[sort], vb = b[sort]; if (sort === 'amount') { va = +va; vb = +vb; } return dir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1); });
    const paged = txs.slice((page - 1) * perPage, page * perPage);
    const pages = Math.ceil(total / perPage) || 1;

    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">Transactions</h1><p class="page-subtitle">${total} transactions</p></div>
        <button class="btn btn-primary" onclick="app.openTransactionModal()"><i class="fas fa-plus"></i> Add Transaction</button></div>
      <div class="filters">
        <input type="text" placeholder="Search..." value="${Utils.esc(this.txState.search)}" oninput="app.txState.search=this.value;app.txState.page=1;app.renderTransactions()">
        <select onchange="app.txState.filters.type=this.value;app.txState.page=1;app.renderTransactions()"><option value="">All Types</option><option value="income" ${this.txState.filters.type==='income'?'selected':''}>Income</option><option value="expense" ${this.txState.filters.type==='expense'?'selected':''}>Expense</option></select>
        <select onchange="app.txState.filters.categoryId=this.value;app.txState.page=1;app.renderTransactions()"><option value="">All Categories</option>${this.store.data.categories.map(c=>`<option value="${c.id}" ${this.txState.filters.categoryId===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        <select onchange="app.txState.filters.accountId=this.value;app.txState.page=1;app.renderTransactions()"><option value="">All Accounts</option>${this.store.data.accounts.map(a=>`<option value="${a.id}" ${this.txState.filters.accountId===a.id?'selected':''}>${a.name}</option>`).join('')}</select>
        <input type="date" onchange="app.txState.filters.start=this.value;app.txState.page=1;app.renderTransactions()" value="${this.txState.filters.start||''}">
        <input type="date" onchange="app.txState.filters.end=this.value;app.txState.page=1;app.renderTransactions()" value="${this.txState.filters.end||''}">
        <button class="btn btn-secondary btn-sm" onclick="app.txState={page:1,perPage:25,sort:'date',dir:'desc',filters:{},search:''};app.renderTransactions()">Clear</button>
      </div>
      ${total ? `<div class="table-wrap"><table><thead><tr>
        ${[['date','Date'],['description','Description'],['categoryId','Category'],['accountId','Account'],['amount','Amount'],['type','Type'],['paymentMethod','Method']].map(([k,l]) =>
          `<th class="${sort===k?'sorted':''}" onclick="app.txState.sort='${k}';app.txState.dir=app.txState.sort==='${k}'&&app.txState.dir==='asc'?'desc':'asc';app.renderTransactions()">${l} <i class="fas fa-sort${sort===k?(dir==='asc'?'-up':'-down'):''}"></i></th>`).join('')}
        <th>Actions</th></tr></thead><tbody>
        ${paged.map(t => `<tr>
          <td>${Utils.formatDate(t.date, this.store.settings)} ${t.time||''}</td>
          <td>${Utils.esc(t.description)} ${t.tags?.length ? t.tags.map(tag => `<span class="tag">${Utils.esc(tag)}</span>`).join('') : ''}</td>
          <td>${this.catName(t.categoryId)}</td><td>${this.accName(t.accountId)}</td>
          <td class="${t.type==='income'?'amount-income':'amount-expense'}">${t.type==='income'?'+':'-'}${this.$(t.amount)}</td>
          <td><span class="badge badge-${t.type}">${t.type}</span></td><td>${Utils.esc(t.paymentMethod||'')}</td>
          <td class="actions">
            <button onclick="app.openTransactionModal('${t.id}')" title="Edit"><i class="fas fa-pen"></i></button>
            <button onclick="app.duplicateTransaction('${t.id}')" title="Duplicate"><i class="fas fa-copy"></i></button>
            <button onclick="app.deleteTransaction('${t.id}')" title="Delete"><i class="fas fa-trash"></i></button>
          </td></tr>`).join('')}
        </tbody></table></div>
        <div class="pagination">
          <button ${page<=1?'disabled':''} onclick="app.txState.page--;app.renderTransactions()"><i class="fas fa-chevron-left"></i></button>
          ${Array.from({length: Math.min(pages, 5)}, (_, i) => { const p = i + 1; return `<button class="${p===page?'active':''}" onclick="app.txState.page=${p};app.renderTransactions()">${p}</button>`; }).join('')}
          <button ${page>=pages?'disabled':''} onclick="app.txState.page++;app.renderTransactions()"><i class="fas fa-chevron-right"></i></button>
        </div>` : '<div class="empty-state"><i class="fas fa-receipt"></i><h3>No transactions yet</h3><p>Start tracking your finances by adding your first transaction.</p><button class="btn btn-primary" onclick="app.openTransactionModal()">Add Transaction</button></div>'}`;
  }

  /** Get filtered transactions */
  getFilteredTransactions() {
    const { search, filters } = this.txState;
    return this.store.data.transactions.filter(t => {
      if (filters.type && t.type !== filters.type) return false;
      if (filters.categoryId && t.categoryId !== filters.categoryId) return false;
      if (filters.accountId && t.accountId !== filters.accountId) return false;
      if (filters.start && t.date < filters.start) return false;
      if (filters.end && t.date > filters.end) return false;
      if (search) {
        const q = search.toLowerCase();
        const hay = [t.description, t.notes, t.paymentMethod, ...(t.tags||[]), this.catName(t.categoryId), this.accName(t.accountId)].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  /** Open transaction modal */
  openTransactionModal(id = null) {
    const t = id ? this.store.get('transactions', id) : {};
    const isEdit = !!id;
    const body = `<div class="form-grid">
      <div class="form-group"><label>Date</label><input type="date" id="txDate" value="${t.date || Utils.toISO(new Date())}"></div>
      <div class="form-group"><label>Time</label><input type="time" id="txTime" value="${t.time || '12:00'}"></div>
      <div class="form-group"><label>Type</label><select id="txType"><option value="expense" ${t.type!=='income'?'selected':''}>Expense</option><option value="income" ${t.type==='income'?'selected':''}>Income</option></select></div>
      <div class="form-group"><label>Amount</label><input type="number" id="txAmount" step="0.01" value="${t.amount || ''}"></div>
      <div class="form-group"><label>Category</label><select id="txCategory">${this.store.data.categories.map(c => `<option value="${c.id}" ${t.categoryId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>Account</label><select id="txAccount">${this.store.data.accounts.map(a => `<option value="${a.id}" ${t.accountId===a.id?'selected':''}>${a.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>Payment Method</label><select id="txPayment"><option ${t.paymentMethod==='Cash'?'selected':''}>Cash</option><option ${t.paymentMethod==='Debit Card'?'selected':''}>Debit Card</option><option ${t.paymentMethod==='Credit Card'?'selected':''}>Credit Card</option><option ${t.paymentMethod==='Bank Transfer'?'selected':''}>Bank Transfer</option><option ${t.paymentMethod==='PayPal'?'selected':''}>PayPal</option><option ${t.paymentMethod==='Other'?'selected':''}>Other</option></select></div>
      <div class="form-group" style="grid-column:1/-1"><label>Description</label><input type="text" id="txDesc" value="${Utils.esc(t.description||'')}"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Tags (comma separated)</label><input type="text" id="txTags" value="${(t.tags||[]).join(', ')}"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Notes</label><textarea id="txNotes">${Utils.esc(t.notes||'')}</textarea></div>
    </div>`;
    const footer = `<button class="btn btn-secondary" onclick="app.modal.close()">Cancel</button>
      <button class="btn btn-primary" onclick="app.saveTransaction('${id||''}')">${isEdit?'Update':'Save'}</button>`;
    this.modal.open(isEdit ? 'Edit Transaction' : 'Add Transaction', body, footer);
  }

  /** Save transaction */
  saveTransaction(id) {
    const data = {
      date: document.getElementById('txDate').value,
      time: document.getElementById('txTime').value,
      type: document.getElementById('txType').value,
      amount: parseFloat(document.getElementById('txAmount').value) || 0,
      categoryId: document.getElementById('txCategory').value,
      accountId: document.getElementById('txAccount').value,
      paymentMethod: document.getElementById('txPayment').value,
      description: document.getElementById('txDesc').value,
      tags: document.getElementById('txTags').value.split(',').map(s => s.trim()).filter(Boolean),
      notes: document.getElementById('txNotes').value
    };
    if (!data.amount || !data.description) { this.toast.show('Amount and description required', 'error'); return; }
    this.checkBudgetWarning(data);
    if (id) { this.store.update('transactions', id, data); this.toast.show('Transaction updated', 'success'); }
    else { this.store.add('transactions', data); this.toast.show('Transaction added', 'success'); }
    this.modal.close();
    this.navigate(this.currentView);
  }

  /** Check budget overrun warning */
  checkBudgetWarning(tx) {
    if (tx.type !== 'expense') return;
    const month = Utils.monthKey(tx.date);
    const budget = this.store.data.budgets.find(b => b.categoryId === tx.categoryId && b.month === month);
    if (budget) {
      const spent = this.calc.budgetSpent(tx.categoryId, month) + tx.amount;
      if (spent > budget.amount) this.toast.show(`Budget exceeded for ${this.catName(tx.categoryId)}!`, 'warning', 5000);
    }
  }

  /** Delete transaction with undo */
  async deleteTransaction(id) {
    if (!await this.modal.confirm('Delete Transaction', 'Are you sure you want to delete this transaction?')) return;
    const tx = this.store.get('transactions', id);
    this.store.data.undoStack = [tx];
    this.store.remove('transactions', id);
    this.toast.show('Transaction deleted', 'info', 5000, { label: 'Undo', fn: () => {
      this.store.add('transactions', tx);
      this.toast.show('Transaction restored', 'success');
      this.navigate(this.currentView);
    }});
    this.navigate(this.currentView);
  }

  /** Duplicate transaction */
  duplicateTransaction(id) {
    const t = { ...this.store.get('transactions', id) };
    delete t.id;
    t.description += ' (copy)';
    t.date = Utils.toISO(new Date());
    this.store.add('transactions', t);
    this.toast.show('Transaction duplicated', 'success');
    this.navigate(this.currentView);
  }

  // ========== INCOME / EXPENSES ==========
  /** Render income or expenses view */
  renderIncomeExpenses(type) {
    const month = Utils.monthKey(new Date());
    const txs = this.store.data.transactions.filter(t => t.type === type && Utils.monthKey(t.date) === month);
    const total = txs.reduce((s, t) => s + t.amount, 0);
    const [s, e] = Utils.periodRange('month');
    const cats = Object.entries(this.calc.categorySpending(s, e, type)).sort((a, b) => b[1] - a[1]);

    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">${type === 'income' ? 'Income' : 'Expenses'}</h1>
        <p class="page-subtitle">This month: <strong class="${type==='income'?'amount-income':'amount-expense'}">${this.$(total)}</strong></p></div>
        <button class="btn btn-primary" onclick="app.openTransactionModal()"><i class="fas fa-plus"></i> Add</button></div>
      <div class="chart-row">
        <div class="card"><div class="card-title">Category Breakdown</div><div class="chart-container"><canvas id="chartIncExp"></canvas></div></div>
        <div class="card"><div class="card-title">Transactions</div>
          ${txs.length ? `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th></tr></thead><tbody>
            ${txs.sort((a,b) => b.date.localeCompare(a.date)).map(t => `<tr><td>${Utils.formatDate(t.date,this.store.settings)}</td><td>${Utils.esc(t.description)}</td><td>${this.catName(t.categoryId)}</td><td class="${type==='income'?'amount-income':'amount-expense'}">${this.$(t.amount)}</td></tr>`).join('')}
          </tbody></table></div>` : `<div class="empty-state" style="padding:30px"><p>No ${type} this month</p></div>`}
        </div>
      </div>`;
    setTimeout(() => {
      const el = document.getElementById('chartIncExp');
      if (el && cats.length) this.charts.render('incExp', el, 'doughnut', {
        labels: cats.map(c => c[0]), datasets: [{ data: cats.map(c => c[1]), backgroundColor: this.charts.colors().palette }]
      });
    }, 50);
  }

  // ========== ACCOUNTS ==========
  /** Render accounts view */
  renderAccounts() {
    const accounts = this.store.data.accounts;
    document.getElementById('mainContent').innerHTML = `
      <div class="page-header"><div><h1 class="page-title">Accounts</h1><p class="page-subtitle">Manage your financial accounts</p></div>
        <div><button class="btn btn-secondary" onclick="app.openTransferModal()"><i class="fas fa-right-left"></i> Transfer</button>
        <button class="btn btn-primary" onclick="app.openAccountModal()"><i class="fas fa-plus"></i> Add Account</button></div></div>

        <div class="stat-card accent" onclick="app.showAccountHistory('${a.id}')" style="cursor:pointer">

          <div class="stat-label">${Utils.esc(a.name)} <small>(${a.type})</small></div>

  /** Show account transaction history */
  showAccountHistory(id) {
    const txs = this.store.data.transactions.filter(t => t.accountId === id || t.transferTo === id || t.transferFrom === id).sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById('accountHistory').innerHTML = `<div class="card"><div class="card-title">Transaction History — ${this.accName(id)}</div>
      ${txs.length ? `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead><tbody>
        ${txs.map(t => `<tr><td>${Utils.formatDate(t.date,this.store.settings)}</td><td>${Utils.esc(t.description)}</td><td class="${t.type==='income'?'amount-income':'amount-expense'}">${this.$(t.amount)}</td></tr>`).join('')}
      </tbody></table></div>` : '<p style="color:var(--text-muted);padding:16px">No transactions</p>'}</div>`;
  }

  /** Open account modal */
  openAccountModal(id = null) {
    const a = id ? this.store.get('accounts', id) : {};
    this.modal.open(id ? 'Edit Account' : 'Add Account', `<div class="form-grid">
      <div class="form-group"><label>Name</label><input id="accName" value="${Utils.esc(a.name||'')}"></div>
      <div class="form-group"><label>Type</label><select id="accType"><option value="cash" ${a.type==='cash'?'selected':''}>Cash</option><option value="bank" ${a.type==='bank'?'selected':''}>Bank</option><option value="savings" ${a.type==='savings'?'selected':''}>Savings</option><option value="crypto" ${a.type==='crypto'?'selected':''}>Crypto</option><option value="investment" ${a.type==='investment'?'selected':''}>Investment</option><option value="custom" ${a.type==='custom'?'selected':''}>Custom</option></select></div>
      <div class="form-group"><label>Opening Balance</label><input type="number" id="accBal" value="${a.openingBalance||0}"></div>
      <div class="form-group"><label>Color</label><input type="color" id="accColor" value="${a.color||'#14b8a6'}"></div>
    </div>`, `<button class="btn btn-secondary" onclick="app.modal.close()">Cancel</button><button class="btn btn-primary" onclick="app.saveAccount('${id||''}')">Save</button>`);
  }

  /** Save account */
  saveAccount(id) {
    const data = { name: document.getElementById('accName').value, type: document.getElementById('accType').value, openingBalance: parseFloat(document.getElementById('accBal').value)||0, color: document.getElementById('accColor').value };
    if (!data.name) { this.toast.show('Name required', 'error'); return; }
    if (id) this.store.update('accounts', id, data); else this.store.add('accounts', data);
    this.modal.close(); this.toast.show('Account saved', 'success'); this.navigate('accounts');
  }

  /** Delete account */
  async deleteAccount(id) {
    if (!await this.modal.confirm('Delete Account', 'Delete this account?')) return;
    this.store.remove('accounts', id); this.toast.show('Account deleted', 'success'); this.navigate('accounts');
  }

  /** Open transfer modal */
  openTransferModal() {
    const accs = this.store.data.accounts;
    this.modal.open('Transfer Money', `<div class="form-grid">
      <div class="form-group"><label>From</label><select id="trFrom">${accs.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>To</label><select id="trTo">${accs.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>Amount</label><input type="number" id="trAmount" step="0.01"></div>
      <div class="form-group"><label>Date</label><input type="date" id="trDate" value="${Utils.toISO(new Date())}"></div>
      <div class="form-group" style="grid-column:1/-1"><label>Notes</label><input id="trNotes"></div>
    </div>`, `<button class="btn btn-secondary" onclick="app.modal.close()">Cancel</button><button class="btn btn-primary" onclick="app.saveTransfer()">Transfer</button>`);
  }

  /** Save transfer */
  saveTransfer() {
    const from = document.getElementById('trFrom').value, to = document.getElementById('trTo').value;
    const amount = parseFloat(document.getElementById('trAmount').value);
    if (from === to) { this.toast.show('Cannot transfer to same account', 'error'); return; }
    if (!amount) { this.toast.show('Amount required', 'error'); return; }
    const date = document.getElementById('trDate').value;
    const notes = document.getElementById('trNotes').value;
    const otherCat = this.store.data.categories.find(c => c.name === 'Other')?.id;
    this.store.add('transactions', { date, time: '12:00', type: 'expense', amount, categoryId: otherCat, accountId: from, description: `Transfer to ${this.accName(to)}`, paymentMethod: 'Transfer', notes, tags: ['transfer'], transferTo: to });
    this.store.add('transactions', { date, time: '12:00', type: 'income', amount, categoryId: otherCat, accountId: to, description: `Transfer from ${this.accName(from)}`, paymentMethod: 'Transfer', notes, tags: ['transfer'], transferFrom: from });
    this.modal.close(); this.toast.show('Transfer completed', 'success'); this.navigate('accounts');
  }

  // ========== CREDIT CARDS ==========

    if (cards.length) setTimeout(() => {

          { label: 'Available', data: cards.map(c => c.limit - c.balance), backgroundColor: this.charts.colors().income }

  openCCModal(id = null) {
    const c = id ? this.store.get('creditCards', id) : {};
    this.modal.open(id ? 'Edit Card' : 'Add Card', `<div class="form-grid">

      <div class="form-group"><label>Bank</label><input id="ccBank" value="${Utils.esc(c.bank||'')}"></div>

      <div class="form-group"><label>Current Balance</label><input type="number" id="ccBal" value="${c.balance||''}"></div>

  /** Open Pay Now modal for loan or credit card */
  openPayNowModal(type, id) {
    const entity = type === 'loan' ? this.store.get('loans', id) : this.store.get('creditCards', id);
    if (!entity) return;
    if (!entity.linkedAccountId) { this.toast.show('Link a bank account first', 'error'); return; }
    if (!entity.nextPaymentDate) { this.toast.show('Set a payment due date first', 'error'); return; }
    const defaultAmount = type === 'loan' ? entity.monthlyPayment : entity.minPayment;
    const balance = type === 'loan' ? entity.currentBalance : entity.balance;
    this.modal.open('Record Payment', `<div class="form-grid">
      <div class="form-group"><label>Amount</label><input type="number" id="payAmount" step="0.01" value="${defaultAmount}"></div>

    </div>`, `<button class="btn btn-secondary" onclick="app.modal.close()">Cancel</button><button class="btn btn-primary" onclick="app.recordPayment('${type}','${id}')">Confirm Payment</button>`);
  }

  /** Record loan or credit card payment */
  recordPayment(type, id) {
    const amount = parseFloat(document.getElementById('payAmount').value);
    const date = document.getElementById('payDate').value;
    if (!amount || amount <= 0) { this.toast.show('Invalid amount', 'error'); return; }
    if (!date) { this.toast.show('Payment date required', 'error'); return; }
    const billsCat = this.store.data.categories.find(c => c.name === 'Bills')?.id;
    if (type === 'loan') {
      const loan = this.store.get('loans', id);
      if (amount > loan.currentBalance) this.toast.show('Payment exceeds balance — paying off loan', 'info', 4000);
      this.store.add('transactions', { date, time: '12:00', type: 'expense', amount, categoryId: billsCat, accountId: loan.linkedAccountId, description: `Loan payment — ${loan.name}`, paymentMethod: 'Bank Transfer', notes: '', tags: ['loan-payment'], linkedLoanId: id });
      this.store.update('loans', id, { currentBalance: Math.max(0, loan.currentBalance - amount), nextPaymentDate: Utils.advanceMonthlyDate(loan.nextPaymentDate), remainingMonths: Math.max(0, (loan.remainingMonths || 0) - 1) });
    } else {
      const card = this.store.get('creditCards', id);
      if (amount > card.balance) this.toast.show('Payment exceeds balance — paying off card', 'info', 4000);
      this.store.add('transactions', { date, time: '12:00', type: 'expense', amount, categoryId: billsCat, accountId: card.linkedAccountId, description: `Credit card payment — ${card.name}`, paymentMethod: 'Bank Transfer', notes: '', tags: ['cc-payment'], linkedCreditCardId: id });
      this.store.update('creditCards', id, { balance: Math.max(0, card.balance - amount), nextPaymentDate: Utils.advanceMonthlyDate(card.nextPaymentDate) });
    }
    this.modal.close();
    this.toast.show('Payment recorded', 'success');
    this.navigate(this.currentView);
  }

  /** Calculate amortization */
  calcAmort() {
    const p = parseFloat(document.getElementById('amPrin').value), r = parseFloat(document.getElementById('amRate').value), m = parseInt(document.getElementById('amTerm').value);
    const result = this.calc.amortization(p, r, m);
    document.getElementById('amResult').innerHTML = `<div style="margin-top:16px"><strong>Monthly Payment:</strong> ${this.$(result.payment)} | <strong>Total Interest:</strong> ${this.$(result.totalInterest)}</div>

        ${result.schedule.slice(0, 24).map(s => `<tr><td>${s.month}</td><td>${this.$(s.payment)}</td><td>${this.$(s.principal)}</td><td>${this.$(s.interest)}</td><td>${this.$(s.balance)}</td></tr>`).join('')}
