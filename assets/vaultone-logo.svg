      <stop offset="0%" stop-color="#faf3e3"/>
      <stop offset="32%" stop-color="#e8c872"/>
      <stop offset="68%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#7a5c12"/>
    </linearGradient>
    <linearGradient id="logo-gold-soft" x1="0%" y1="0%" x2="100%" y2="100%">
